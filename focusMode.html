<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NeuroClarus · Focus Mode</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="icon" type="image/png" href="/img/logo.svg">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="focus-bg">
  <div vw class="enabled">
    <div vw-access-button class="active"></div>
    <div vw-plugin-wrapper><div class="vw-plugin-top-wrapper"></div></div>
  </div>

  <nav class="navbar-custom">
    <a class="navbar-brand" href="index.html"><img src="/img/logo2.svg" alt="NeuroClarus"></a>
    <div></div>
    <a href="index.html" class="btn-close-custom"><i class="fas fa-times"></i> Sair</a>
  </nav>

  <main class="main-container text-center">
    <h2 class="mb-2">Focus Mode</h2>
    <p id="focusName" class="fs-4 fw-semibold mb-4">Carregando...</p>

    <div class="timer-display" id="timerDisplay">25:00</div>

    <div class="d-flex justify-content-center gap-3 mt-4">
      <button class="btn-timer" id="pauseBtn"><i class="fas fa-pause me-2"></i>Pause</button>
      <button class="btn-timer primary" id="completeBtn">Focus Completado</button>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
  <script>new window.VLibras.Widget('https://vlibras.gov.br/app');</script>
  <script src="js/timer.js"></script>
</body>
</html>
