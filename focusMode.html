<!-- focusmode.html (estático conforme Figma) -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroClarus · Focus Mode</title>
    <link href="https://fonts.googleapis.com/css2?family=Kenia+One&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div vw class="enabled">
        <div vw-access-button class="active"></div>
        <div vw-plugin-wrapper><div class="vw-plugin-top-wrapper"></div></div>
    </div>

    <header>
        <nav class="navbar custom-navbar">
            <div class="container">
                <a class="navbar-brand" href="index.html">
                    <img src="img/logo2.svg" alt="NeuroClarus" height="40">
                </a>
                <div class="ms-auto">
                    <a href="index.html" class="btn btn-outline-secondary rounded-pill">
                        <i class="fas fa-times me-1"></i> Sair
                    </a>
                </div>
            </div>
        </nav>
    </header>

    <main class="py-4">
        <div class="container">
            <h2 class="text-center fw-semibold mb-4">Focus Mode</h2>
            
            <div class="card glass-card border-0 rounded-4 p-4 mb-4">
                <h3 class="h4 fw-semibold mb-0">Estudar para prova de FIA.</h3>
            </div>

            <div class="card glass-card border-0 rounded-4 p-4 mb-4 text-center">
                <div class="timer-display mb-3">21:03:06</div>
                <div class="d-flex justify-content-center gap-3">
                    <button class="btn btn-outline-primary rounded-pill px-4"><i class="fas fa-pause me-2"></i>Pause</button>
                    <button class="btn btn-gradient rounded-pill px-4"><i class="fas fa-check-circle me-2"></i>Focus Completado</button>
                </div>
            </div>

            <div class="card glass-card border-0 rounded-4 p-4">
                <h4 class="mb-3"><i class="fas fa-list-check me-2"></i>Atividades</h4>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="act1">
                    <label class="form-check-label" for="act1">Revisar capítulo 1</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="act2">
                    <label class="form-check-label" for="act2">Resolver exercícios</label>
                </div>
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
</body>
</html>
