<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroClarus</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Kenia+One&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Estilo customizado -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- VLibras -->
    <div vw class="enabled">
        <div vw-access-button class="active"></div>
        <div vw-plugin-wrapper><div class="vw-plugin-top-wrapper"></div></div>
    </div>

    <!-- Navbar (mesma de sempre) -->
    <header>
        <nav class="navbar navbar-expand-lg custom-navbar">
            <div class="container">
                <a class="navbar-brand" href="index.html">
                    <img src="img/logo2.svg" alt="NeuroClarus" height="40">
                </a>
                <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav">
                        <li class="nav-item"><a class="nav-link active" href="index.html">Dashboard</a></li>
                        <li class="nav-item"><a class="nav-link" href="focusmode.html">Focus Mode</a></li>
                        <li class="nav-item"><a class="nav-link" href="historico.html">Histórico</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="py-4">
        <div class="container">
            <!-- Cabeçalho da página -->
            <div class="d-grid justify-content-between align-items-start mb-4">
                <div>
                    <h1 class="display-5 fw-bold text-gradient mb-2">Focos do Dia</h1>
                    <p class="text-secondary">O seu foco para o progresso intencional.</p>
                </div>
                <button class="btn btn-gradient" data-bs-toggle="modal" data-bs-target="#addFocusModal">
                    <i class="fas fa-plus me-2"></i>Adicionar focus
                </button>
            </div>

            <!-- Container dos cards (row com gap) -->
            <div class="col g-10" id="focusCardsContainer">
            </div>

            <!-- Contadores -->
            <div class="d-flex gap-4 mt-5 pt-3 border-top border-light">
                <span class="fw-medium"><span class="fw-bold text-purple fs-5" id="focusCount">0</span> focus</span>
                <span class="fw-medium"><span class="fw-bold text-purple fs-5" id="focaisCount">0</span> focais</span>
            </div>
        </div>
    </main>

    <!-- Modal Adicionar Focus (estrutura idêntica à anterior) -->
    <div class="modal fade" id="addFocusModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content glass-modal border-0 rounded-4">
                <div class="modal-header border-0">
                    <h5 class="modal-title fw-semibold">Adicionar Focus novo:</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label fw-medium">Título:</label>
                        <input type="text" class="form-control rounded-pill" id="focusTitle" placeholder="Ex: Estudar para prova de FIA">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-medium">Atividades:</label>
                        <div id="activitiesContainer">
                            <div class="input-group mb-2">
                                <input type="text" class="form-control rounded-pill activity-input" placeholder="Descreva a atividade">
                                <button class="btn btn-outline-danger rounded-circle ms-2 d-none" type="button"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>
                        <button type="button" class="btn btn-outline-primary rounded-pill mt-1" id="addActivityBtn">
                            <i class="fas fa-plus-circle me-1"></i> Adicionar
                        </button>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-medium">Horário:</label>
                        <input type="time" class="form-control rounded-pill" id="focusTime">
                    </div>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-gradient w-100" id="saveFocusBtn">Concluído</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
