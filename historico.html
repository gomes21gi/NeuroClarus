<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroClarus · Histórico</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div vw class="enabled">
        <div vw-access-button class="active"></div>
        <div vw-plugin-wrapper><div class="vw-plugin-top-wrapper"></div></div>
    </div>

    <header>
        <nav class="navbar navbar-expand-lg custom-navbar">
            <div class="container">
                <a class="navbar-brand" href="index.html">
                    <img src="img/logo2.svg" alt="NeuroClarus" height="40">
                </a>
                <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav">
                        <li class="nav-item"><a class="nav-link" href="index.html">Dashboard</a></li>
                        <li class="nav-item"><a class="nav-link" href="focusmode.html">Focus Mode</a></li>
                        <li class="nav-item"><a class="nav-link active" href="historico.html">Histórico</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="py-4">
        <div class="container">
            <h1 class="display-5 fw-bold text-gradient mb-2">Histórico</h1>
            <p class="text-secondary mb-4">O seu foco para o progresso intencional.</p>
            
            <!-- Itens concluídos -->
            <div class="col-md-6">
                <div class="card glass-card border-0 rounded-4 p-4 h-100">
                    <ul class="list-unstyled mb-0">
                        <li class="mb-3">
                            <div class="d-flex align-items-start">
                                <i class="far fa-check-circle text-success me-3 mt-1"></i>
                                <div>
                                    <span class="fw-medium">Estudar sobre GR.</span>
                                    <span class="badge bg-light rounded-pill ms-2">1 atividade</span>
                                    <div class="text-secondary small mt-1">Revisar capítulo 5</div>
                                </div>
                            </div>
                        </li>
                        <li class="mb-3">
                            <div class="d-flex align-items-start">
                                <i class="far fa-check-circle text-success me-3 mt-1"></i>
                                <div>
                                    <span class="fw-medium">Estudar para prova de Estrutura de Dados.</span>
                                    <span class="badge bg-light rounded-pill ms-2">3 atividades</span>
                                    <div class="text-secondary small mt-1">Revisar listas, Estudar pilhas, Praticar filas</div>
                                </div>
                            </div>
                        </li>
                    </ul>
                </div>
            </div>

            <!-- Cards do histórico -->
            <div class="row g-4">
                <!-- Card de resumo (24 horas / 19 semanas) -->
                <div class="col-md-6">
                    <div class="card glass-card border-0 rounded-4 p-4 h-100">
                        <div class="d-flex justify-content-around text-center">
                            <div>
                                <div class="display-6 fw-bold text-purple">24</div>
                                <div class="text-secondary">horas</div>
                            </div>
                            <div>
                                <div class="display-6 fw-bold text-purple">19</div>
                                <div class="text-secondary">semanas</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
</body>
</html>
